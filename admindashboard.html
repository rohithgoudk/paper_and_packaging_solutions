<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulp &amp; Press — Admin Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#17130F;
      --surface:rgba(246,241,231,0.035);
      --surface-2:rgba(246,241,231,0.06);
      --border:rgba(246,241,231,0.1);
      --accent:#CDA46B;
      --accent-soft:rgba(205,164,107,0.16);
      --stamp:#C24B3A;
      --text-primary:#F6F1E7;
      --text-secondary:rgba(246,241,231,0.62);
      --text-tertiary:rgba(246,241,231,0.4);
      --display:'Anton','Arial Narrow',sans-serif;
      --mono:'Space Mono',monospace;
      --ease:cubic-bezier(.22,1,.36,1);
      --radius:16px;
      --radius-sm:10px;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      background:var(--bg);
      color:var(--text-primary);
      font-family:'Inter',sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
    }
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-thumb{background:rgba(246,241,231,0.15);border-radius:9999px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::selection{ background:var(--stamp); color:var(--text-primary); }

    .dashboard-root{display:flex;min-height:100vh;width:100%;overflow-x:hidden;position:relative;}
    .dashboard-root::before{
      content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:repeating-linear-gradient(180deg, rgba(246,241,231,.02) 0px, rgba(246,241,231,.02) 1px, transparent 1px, transparent 9px);
    }

    /* ============ Sidebar ============ */
    .sidebar-overlay{display:none;}
    .sidebar{
      width:256px;flex-shrink:0;background:#120E0A;border-right:1px solid var(--border);
      display:flex;flex-direction:column;padding:1.5rem 1rem;position:sticky;top:0;height:100vh;overflow-y:auto;
      z-index:1;
    }
    .sidebar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;padding:0 .25rem;}
    .brand{display:flex;align-items:center;gap:.55rem;}
    .brand-logo-img{ height:34px; width:auto; max-width:160px; object-fit:contain; display:block; }
    .brand-logo-fallback{
      display:none; align-items:center; gap:8px;
    }
    .brand-logo-fallback svg{ width:30px; height:30px; flex-shrink:0; }
    .brand-logo-fallback span{ font-family:var(--display); font-size:15px; text-transform:uppercase; letter-spacing:.01em; color:var(--text-primary); }
    .brand-logo-fallback span em{ font-style:normal; color:var(--stamp); }
    .close-btn{display:none;background:transparent;border:none;color:var(--text-secondary);font-size:1rem;cursor:pointer;width:30px;height:30px;border-radius:50%;align-items:center;justify-content:center;transition:background .2s ease,color .2s ease;}
    .close-btn:hover{background:var(--surface-2);color:#fff;}
    .sidebar-section-label{font-family:var(--mono);font-size:.62rem;font-weight:700;letter-spacing:.12em;color:var(--text-tertiary);padding:0 .6rem;margin:1.25rem 0 .5rem;text-transform:uppercase;}
    .sidebar-nav{display:flex;flex-direction:column;gap:.15rem;}
    .nav-item{display:flex;align-items:center;gap:.7rem;width:100%;padding:.6rem .65rem;border-radius:var(--radius-sm);background:transparent;border:none;color:var(--text-secondary);font-size:.85rem;font-weight:500;font-family:inherit;cursor:pointer;text-align:left;transition:background .15s ease,color .15s ease,transform .15s ease;position:relative;}
    .nav-item:hover{background:var(--surface-2);color:#fff;transform:translateX(2px);}
    .nav-item.nav-active{background:var(--accent-soft);color:#fff;box-shadow:inset 0 0 0 1px rgba(205,164,107,.4);}
    .nav-icon{font-size:.95rem;width:1.1rem;text-align:center;flex-shrink:0;}
    .nav-badge{margin-left:auto;background:var(--stamp);color:#F6F1E7;font-family:var(--mono);font-size:.62rem;font-weight:700;border-radius:9999px;padding:.05rem .4rem;}

    .sidebar-user{
      display:flex;align-items:center;gap:.6rem;margin-top:.75rem;margin-bottom:.5rem;
      padding:.55rem .6rem;border-radius:var(--radius-sm);
      background:var(--surface);border:1px solid var(--border);
    }
    .sidebar-user-avatar{
      width:32px;height:32px;border-radius:50%;flex-shrink:0;
      background:var(--accent-soft);color:var(--accent);
      display:flex;align-items:center;justify-content:center;
      font-family:var(--mono);font-weight:700;font-size:.8rem;
      text-transform:uppercase;
    }
    .sidebar-user-info{min-width:0;flex:1;}
    .sidebar-user-name{font-size:.78rem;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:capitalize;}
    .sidebar-user-email{font-size:.65rem;color:var(--text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    .logout-full-btn{
      display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.7rem .9rem;border-radius:var(--radius-sm);
      background:rgba(246,241,231,0.02);border:1px solid var(--border);color:var(--text-secondary);font-size:.78rem;font-weight:700;
      font-family:var(--mono);letter-spacing:.03em;text-transform:uppercase;cursor:pointer;transition:border-color .2s ease,color .2s ease,background .2s ease;text-decoration:none;
    }
    .logout-full-btn:hover{border-color:rgba(194,75,58,.5);color:#fff;background:rgba(194,75,58,.14);}

    /* ============ Main content ============ */
    .main-content{flex:1;min-width:0;max-width:100%;display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1;}
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:0.5rem;padding:0.75rem 1rem;background:rgba(23,19,15,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-wrap:nowrap;}
    .topbar-left{display:flex;align-items:center;gap:0.6rem;min-width:0;flex-shrink:1;}
    .hamburger{display:none;flex-direction:column;gap:3px;background:transparent;border:none;cursor:pointer;padding:0.3rem;flex-shrink:0;}
    .hamburger span{width:16px;height:2px;background:#fff;border-radius:2px;}
    .page-title{min-width:0;display:flex;align-items:baseline;gap:0.4rem;flex-wrap:nowrap;}
    .page-title h1{font-family:var(--display);text-transform:uppercase;letter-spacing:.005em;font-size:1.15rem;font-weight:400;color:#fff;line-height:1.2;margin:0;white-space:nowrap;}
    .page-title p{font-size:0.7rem;color:var(--text-tertiary);margin:0;white-space:nowrap;display:none;}
    .topbar-right{display:flex;align-items:center;gap:0.5rem;flex-shrink:0;margin-left:auto;}
    .search-box{display:flex;align-items:center;gap:0.3rem;background:var(--surface);border:1px solid var(--border);border-radius:9999px;padding:0.3rem 0.7rem;min-width:0;flex-shrink:1;cursor:pointer;}
    .search-box input{background:transparent;border:none;outline:none;color:#fff;font-size:0.7rem;font-family:inherit;width:120px;max-width:100%;min-width:40px;}
    .search-box input::placeholder{color:var(--text-tertiary);font-size:0.65rem;}
    .search-icon{font-size:0.7rem;opacity:.6;}
    .icon-btn{position:relative;width:30px;height:30px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.8rem;transition:border-color .2s ease,transform .2s ease;flex-shrink:0;}
    .icon-btn:hover{border-color:rgba(205,164,107,.4);transform:translateY(-1px);}
    .notif-dot{position:absolute;top:6px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--stamp);box-shadow:0 0 0 2px #120E0A;animation:notifPulse 2.2s ease-in-out infinite;}
    @keyframes notifPulse{ 0%,100%{ box-shadow:0 0 0 2px #120E0A, 0 0 0 2px rgba(194,75,58,.5); } 50%{ box-shadow:0 0 0 2px #120E0A, 0 0 0 5px rgba(194,75,58,0); } }
    .content-area{padding:1rem 1rem 2rem;display:flex;flex-direction:column;gap:1rem;min-width:0;max-width:100%;overflow-x:hidden;}

    .topbar-user{position:relative;flex-shrink:0;}
    .topbar-user-btn{display:flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);border-radius:9999px;padding:.2rem .6rem .2rem .2rem;cursor:pointer;transition:border-color .2s ease;}
    .topbar-user-btn:hover{border-color:rgba(205,164,107,.4);}
    .topbar-user-avatar{
      width:26px;height:26px;border-radius:50%;flex-shrink:0;
      background:var(--accent);color:#17130F;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--mono);font-weight:700;font-size:.68rem;
      text-transform:uppercase;
    }
    .topbar-user-name{font-size:.72rem;font-weight:600;color:#fff;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:capitalize;}
    .topbar-user-caret{font-size:.6rem;color:var(--text-tertiary);}
    .topbar-user-menu{
      position:absolute;top:calc(100% + 10px);right:0;width:220px;
      background:#1E1710;border:1px solid var(--border);border-radius:var(--radius-sm);
      padding:.5rem;box-shadow:0 18px 40px rgba(0,0,0,.5);
      opacity:0;visibility:hidden;transform:translateY(-6px);
      transition:opacity .2s var(--ease),transform .2s var(--ease),visibility .2s ease;z-index:60;
    }
    .topbar-user.open .topbar-user-menu{opacity:1;visibility:visible;transform:translateY(0);}
    .topbar-user-menu-email{padding:.5rem .6rem .6rem;border-bottom:1px solid var(--border);margin-bottom:.35rem;}
    .topbar-user-menu-email .label{font-family:var(--mono);font-size:.58rem;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;}
    .topbar-user-menu-email .value{font-size:.7rem;font-weight:600;color:#fff;margin-top:2px;word-break:break-all;}
    .topbar-user-menu-item{display:flex;align-items:center;gap:.5rem;width:100%;padding:.5rem .6rem;border-radius:6px;background:none;border:none;text-align:left;font-size:.7rem;font-weight:600;color:var(--text-secondary);font-family:inherit;cursor:pointer;transition:background .15s ease,color .15s ease;}
    .topbar-user-menu-item:hover{background:rgba(246,241,231,.05);color:#fff;}
    .topbar-user-menu-item.danger:hover{background:rgba(194,75,58,.16);color:#E9AFA5;}

    /* ============ Welcome banner ============ */
    .welcome-banner{
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.6rem;
      background:linear-gradient(120deg,rgba(205,164,107,.15),rgba(205,164,107,.02));
      border:1px solid rgba(205,164,107,.28);border-radius:var(--radius);padding:1rem 1.25rem;
      opacity:0; transform:translateY(10px); animation:cardPop .5s var(--ease) forwards;
    }
    .welcome-text h2{font-family:var(--display);text-transform:uppercase;letter-spacing:.005em;font-weight:400;font-size:1.1rem;margin:0;color:#fff;}
    .welcome-stats-mini{display:flex;align-items:center;gap:0.8rem;}
    .mini-stat{display:flex;flex-direction:column;align-items:flex-end;}
    .mini-stat-value{font-family:var(--display);font-size:1.15rem;color:var(--accent);font-weight:400;}
    .mini-stat-label{font-family:var(--mono);font-size:.58rem;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;}
    .mini-stat-divider{width:1px;height:24px;background:var(--border);}

    /* ============ Stats grid ============ */
    .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0.8rem;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.9rem 1rem;min-width:0;cursor:pointer;transition:border-color .2s ease,transform .2s ease;
      opacity:0; transform:translateY(12px); animation:cardPop .5s var(--ease) forwards;}
    .stats-grid .stat-card:nth-child(1){animation-delay:.03s;}
    .stats-grid .stat-card:nth-child(2){animation-delay:.08s;}
    .stats-grid .stat-card:nth-child(3){animation-delay:.13s;}
    .stats-grid .stat-card:nth-child(4){animation-delay:.18s;}
    .stats-grid .stat-card:nth-child(5){animation-delay:.23s;}
    .stats-grid .stat-card:nth-child(6){animation-delay:.28s;}
    @keyframes cardPop{ to{ opacity:1; transform:translateY(0); } }
    .stat-card:hover{border-color:rgba(205,164,107,.35);transform:translateY(-3px);}
    .stat-card.stat-accent{background:linear-gradient(160deg,rgba(205,164,107,.13),rgba(205,164,107,.02));border-color:rgba(205,164,107,.4);}
    .stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;}
    .stat-icon{font-size:0.95rem;}
    .stat-delta{font-family:var(--mono);font-size:.58rem;font-weight:700;padding:.1rem .4rem;border-radius:9999px;color:var(--text-tertiary);}
    .stat-delta.up{color:#A9CC9A;background:rgba(110,145,96,.14);}
    .stat-value{font-family:var(--display);font-size:1.5rem;color:#fff;line-height:1.1;font-weight:400;}
    .stat-label{font-size:.68rem;color:var(--text-secondary);margin-top:.2rem;}
    .stat-bar{height:3px;background:rgba(246,241,231,.07);border-radius:9999px;overflow:hidden;margin-top:.6rem;}
    .stat-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#E8D2AC);border-radius:9999px;transition:width 1.1s var(--ease) .25s;}

    /* ============ Charts ============ */
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
    .chart-card{padding:1rem;}
    .chart-controls{display:flex;gap:.3rem;}
    .chart-container{margin-top:.3rem;}
    .chart-svg{width:100%;height:auto;display:block;}
    .bar-animate{transition:height .8s var(--ease), y .8s var(--ease);}
    .growth-line{ opacity:0; animation:fadeUp .7s var(--ease) .2s forwards; }
    .growth-point{ opacity:0; animation:fadeUp .5s var(--ease) forwards; }
    @keyframes fadeUp{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
    .donut-path{ opacity:0; animation:fadeUp .6s var(--ease) forwards; }

    /* ============ Bottom grid ============ */
    .bottom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.8rem;}
    @media (max-width:1150px){.charts-grid{grid-template-columns:1fr;}.bottom-grid{grid-template-columns:1fr;}}
    @media (max-width:900px){.stats-grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
    @media (max-width:560px){.stats-grid{grid-template-columns:minmax(0,1fr);}}

    /* ============ Card ============ */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;min-width:0;
      opacity:0; transform:translateY(12px); animation:cardPop .5s var(--ease) .08s forwards;}
    .card.full-width{width:100%;}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.6rem;margin-bottom:0.8rem;flex-wrap:wrap;}
    .card-title{font-family:var(--display);text-transform:uppercase;letter-spacing:.005em;font-size:1rem;font-weight:400;color:#fff;margin:0;}
    .card-sub{font-size:.68rem;color:var(--text-tertiary);margin:.1rem 0 0;}

    /* ============ Buttons ============ */
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:9999px;padding:.3rem .7rem;font-family:var(--mono);font-size:.65rem;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:border-color .2s ease,color .2s ease,transform .2s ease;}
    .btn-outline:hover{border-color:rgba(205,164,107,.4);color:#fff;transform:translateY(-1px);}
    .btn-outline.active,.btn-outline.btn-active{border-color:var(--accent);color:var(--accent);}
    .btn-sm{padding:.25rem .6rem;font-size:.6rem;}
    .btn-primary{background:linear-gradient(120deg,var(--accent),#A97C4F);color:#17130F;border:none;border-radius:9999px;padding:.3rem .8rem;font-family:var(--mono);font-size:.65rem;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:transform .2s ease;}
    .btn-primary:hover{transform:scale(1.04);}
    .btn-icon{background:transparent;border:1px solid var(--border);border-radius:6px;width:24px;height:24px;font-size:.65rem;cursor:pointer;margin-right:2px;transition:border-color .2s ease;}
    .btn-icon:hover{border-color:rgba(205,164,107,.4);}
    .btn-approve{background:rgba(110,145,96,.16);color:#A9CC9A;border:1px solid rgba(110,145,96,.32);border-radius:6px;padding:.3rem .6rem;font-family:var(--mono);font-size:.6rem;font-weight:700;cursor:pointer;}
    .btn-reject{background:rgba(194,75,58,.14);color:#E9AFA5;border:1px solid rgba(194,75,58,.3);border-radius:6px;padding:.3rem .6rem;font-family:var(--mono);font-size:.6rem;font-weight:700;cursor:pointer;margin-left:.3rem;}
    .btn-danger{background:rgba(194,75,58,.12);border:1px solid rgba(194,75,58,.38);color:#E9AFA5;border-radius:9999px;padding:.4rem .9rem;font-family:var(--mono);font-size:.65rem;font-weight:700;cursor:pointer;}

    /* ============ Tables ============ */
    .table-wrapper{overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;}
    table{width:100%;border-collapse:collapse;font-size:.72rem;min-width:500px;}
    thead th{text-align:left;font-family:var(--mono);font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary);padding:0 .5rem .5rem;border-bottom:1px solid var(--border);}
    tbody tr{transition:background .15s ease;cursor:pointer;}
    tbody tr:hover{background:rgba(246,241,231,.025);}
    td{padding:.6rem .5rem;border-bottom:1px solid rgba(246,241,231,.05);vertical-align:middle;color:var(--text-secondary);}
    .t-name{color:#fff;font-weight:600;font-size:.75rem;}
    .t-sub{font-size:.62rem;color:var(--text-tertiary);margin-top:.1rem;}
    .user-name{color:#fff;font-weight:600;font-size:.75rem;}
    .user-email{font-size:.62rem;color:var(--text-tertiary);margin-top:.1rem;}
    .region-tag{display:inline-block;font-family:var(--mono);font-size:.58rem;font-weight:700;padding:.15rem .45rem;border-radius:9999px;border:1px solid;}
    .rank-badge{display:inline-block;font-family:var(--mono);font-size:.58rem;font-weight:700;padding:.15rem .5rem;border-radius:9999px;border:1px solid;background:rgba(246,241,231,.04);}
    .type-col{font-size:.7rem;}
    .date-col{font-size:.68rem;white-space:nowrap;}
    .budget-col{font-weight:700;color:#fff;font-family:var(--mono);font-size:.7rem;}
    .status-badge{display:inline-block;font-family:var(--mono);font-size:.58rem;font-weight:700;padding:.15rem .5rem;border-radius:9999px;text-transform:uppercase;letter-spacing:.02em;}
    .status-badge.status-active{background:rgba(110,145,96,.16);color:#A9CC9A;}
    .status-badge.status-field{background:rgba(205,164,107,.2);color:#E8D2AC;}
    .status-badge.status-complete{background:rgba(143,160,172,.18);color:#C9D3D9;}
    .status-badge.status-review{background:rgba(143,160,172,.16);color:#C9D3D9;}
    .progress-wrap{display:flex;align-items:center;gap:.3rem;min-width:80px;}
    .progress-bar{flex:1;height:4px;background:rgba(246,241,231,.08);border-radius:9999px;overflow:hidden;}
    .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#E8D2AC);border-radius:9999px;transition:width 1s var(--ease) .2s;}
    .progress-pct{font-family:var(--mono);font-size:.6rem;color:var(--text-tertiary);flex-shrink:0;}
    .project-count{font-family:var(--display);font-weight:400;color:var(--accent);}

    /* ============ Filter row / search ============ */
    .filter-row{display:flex;gap:4px;flex-wrap:wrap;}
    .search-box.card-search{min-width:0;max-width:100%;}

    /* ============ Alerts ============ */
    .alerts-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.6rem;}
    @media (max-width:700px){.alerts-grid{grid-template-columns:1fr;}}
    .alert-item{display:flex;gap:.5rem;padding:.6rem .8rem;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;transition:background .15s ease,transform .15s ease;}
    .alert-item:hover{background:var(--surface-2);transform:translateX(2px);}
    .alert-warning{background:rgba(217,139,63,.05);}
    .alert-error{background:rgba(194,75,58,.05);}
    .alert-success{background:rgba(110,145,96,.04);}
    .alert-icon{font-size:.95rem;flex-shrink:0;}
    .alert-message{font-size:.72rem;color:#fff;line-height:1.3;}
    .alert-time{font-family:var(--mono);font-size:.58rem;color:var(--text-tertiary);margin-top:.15rem;display:block;}

    /* ============ Donut + legend ============ */
    .donut-chart{display:flex;justify-content:center;margin-bottom:0.6rem;}
    .donut-svg{width:120px;height:120px;}
    .donut-num{font-family:var(--display);font-size:18px;fill:#fff;}
    .donut-label{font-family:var(--mono);font-size:7px;fill:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;}
    .legend-list{list-style:none;display:flex;flex-direction:column;gap:.3rem;margin:0;padding:0;}

    .region-fill{height:100%;width:0;border-radius:9999px;transition:width 1.1s var(--ease) .25s;}

    /* ============ Approvals list (dashboard) ============ */
    .approval-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.3rem;}
    .approval-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .7rem;cursor:pointer;transition:border-color .2s ease;}
    .approval-item:hover{border-color:rgba(205,164,107,.3);}
    .approval-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.2rem;}
    .approval-id{font-family:var(--mono);font-size:.6rem;color:var(--text-tertiary);}

    .approval-footer{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.6rem;color:var(--text-tertiary);flex-wrap:wrap;gap:3px;}

function getCurrentUser() {
  try {
    const raw = localStorage.getItem('user');
    const isAuthenticated = localStorage.getItem('isAuthenticated') === 'true';
    if (!raw || !isAuthenticated) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}
function usernameFromEmail(email) {
  if (!email) return '';
  return email.includes('@') ? email.split('@')[0] : email;

function statCard(s) {

      <div class="stat-top">
        <span class="stat-icon">${s.icon}</span>
        ${s.change ? `<span class="stat-delta ${s.change.startsWith("+") ? "up" : ""}">${s.change}</span>` : ""}

      <div class="stat-value" ${s.small ? 'style="font-size:1.2rem;"' : ""}>${s.value}</div>

    </div>`;
}

function animateFills(){

function renderDashboardPage() {
  const stats = [
    { icon: "🏢", value: adminStats.totalPartners.toLocaleString(), label: "Total Partner Accounts", change: "+12.4%", bar: 85, accent: true },
    { icon: "🟢", value: adminStats.activePartners.toLocaleString(), label: "Active Partners", change: "+8.2%", bar: 66 },
    { icon: "🏭", value: adminStats.totalTeams, label: "Facility Crews", change: "+3", bar: 70 },
    { icon: "🗂", value: adminStats.totalProducts.toLocaleString(), label: "Products", change: "+6", bar: 78 },
    { icon: "💰", value: fmt(adminStats.totalBudget), label: "Total Materials Budget", change: "+$24K", bar: 90, accent: true },
    { icon: "⏳", value: adminStats.pendingApprovals, label: "Pending Approvals", change: "+5", bar: 45 },
  ];

  const maxGrowth = Math.max(...partnerGrowthData);
  const growthLines = partnerGrowthData.map((_, i) => {
    if (i >= partnerGrowthData.length - 1) return "";
    const x = (i / (partnerGrowthData.length - 1)) * 480 + 10;
    const y1 = 190 - (partnerGrowthData[i] / maxGrowth) * 170;
    const x2 = x + 480 / (partnerGrowthData.length - 1);
    const y2 = 190 - (partnerGrowthData[i + 1] / maxGrowth) * 170;
    return `<line class="growth-line" style="animation-delay:${i * 0.03}s" x1="${x}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#CDA46B" stroke-width="2.5" stroke-linecap="round"/>`;
  }).join("");
  const growthPoints = partnerGrowthData.map((d, i) => {
    const x = (i / (partnerGrowthData.length - 1)) * 480 + 10;
    const y = 190 - (d / maxGrowth) * 170;
    return `<circle class="growth-point" style="animation-delay:${i * 0.04}s" cx="${x}" cy="${y}" r="4" fill="#CDA46B" stroke="#17130F" stroke-width="1.5"/>`;
  }).join("");
  const growthPolygon = "10,190 " + partnerGrowthData.map((d, i) => {
    const x = (i / (partnerGrowthData.length - 1)) * 480 + 10;
    const y = 190 - (d / maxGrowth) * 170;
    return `${x},${y}`;
  }).join(" ") + " 490,190";

  const months = ["J","F","M","A","M","J","J","A","S","O","N","D"];
  const monthLabels = months.map((m, i) => `<text x="${10 + i * 40}" y="195" fill="rgba(246,241,231,0.3)" font-size="10">${m}</text>`).join("");

  const maxRev = Math.max(...monthlySpend);
  const revBars = monthlySpend.map((d, i) => {
    const x = (i / (monthlySpend.length - 1)) * 480 + 10;
    const h = (d / maxRev) * 170;
    return `<rect class="bar-animate" style="animation-delay:${i*0.03}s" x="${x - 8}" y="${190 - h}" width="16" height="${h}" rx="3" fill="${d > 500 ? "#CDA46B" : "rgba(205,164,107,0.5)"}"><title>${d}</title></rect>`;
  }).join("");

  const totalStatus = teamStatusBreakdown.reduce((s, p) => s + p.value, 0);
  let acc = 0;
  const donutPaths = teamStatusBreakdown.map((item, i) => {
    const start = acc;
    const end = start + (item.value / totalStatus) * Math.PI * 2;
    const x1 = 60 + 45 * Math.cos(start), y1 = 60 + 45 * Math.sin(start);
    const x2 = 60 + 45 * Math.cos(end), y2 = 60 + 45 * Math.sin(end);
    const large = end - start > Math.PI ? 1 : 0;
    acc = end;
    return `<path class="donut-path" style="animation-delay:${i*0.08}s" d="M ${x1} ${y1} A 45 45 0 ${large} 1 ${x2} ${y2} L 60 60" fill="${item.color}" opacity="0.9"/>`;
  }).join("");

  const legendItems = teamStatusBreakdown.map(l => `
    <li class="legend-item"><span class="legend-dot" style="background:${l.color}"></span><span class="legend-label">${l.label}</span><span class="legend-count">${l.value}</span></li>`).join("");

  const userRows = recentPartners.map(user => `
    <tr>
      <td><div class="user-name">${esc(user.name)}</div><div class="user-email">${esc(user.email)}</div></td>

      <div class="alert-content"><div class="alert-message">${esc(a.message)}</div><div class="alert-time">${a.time}</div></div>
    </div>`).join("");

  return `
    <div class="welcome-banner">
      <div class="welcome-text"><h2>Welcome back, ${esc(currentDisplayName)} 👋</h2></div>
      <div class="welcome-stats-mini">
        <div class="mini-stat"><span class="mini-stat-value">${adminStats.totalPartners.toLocaleString()}</span><span class="mini-stat-label">Partners</span></div>
        <div class="mini-stat-divider"></div>
        <div class="mini-stat"><span class="mini-stat-value">${adminStats.totalTeams}</span><span class="mini-stat-label">Crews</span></div>
        <div class="mini-stat-divider"></div>
        <div class="mini-stat"><span class="mini-stat-value">${fmt(adminStats.totalBudget)}</span><span class="mini-stat-label">Budget</span></div>
      </div>
    </div>

    <section class="stats-grid">${stats.map(statCard).join("")}</section>

    <section class="charts-grid">
      <div class="card chart-card">
        <div class="card-header">
          <div><h2 class="card-title">Partner Growth</h2><p class="card-sub">Monthly new sign-ups</p></div>
          <div class="chart-controls"><button class="btn-outline btn-sm active">Year</button><button class="btn-outline btn-sm">Month</button></div>
        </div>
        <div class="chart-container">
          <svg viewBox="0 0 500 200" class="chart-svg">
            <defs><linearGradient id="growthGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CDA46B" stop-opacity="0.3"/><stop offset="100%" stop-color="#CDA46B" stop-opacity="0"/></linearGradient></defs>
            ${growthLines}
            <polygon points="${growthPolygon}" fill="url(#growthGrad)"/>
            ${growthPoints}
            ${monthLabels}
          </svg>
        </div>
      </div>
      <div class="card chart-card">

    </div>

    <div class="card danger-zone">
      <div class="card-header"><div><h2 class="card-title">Danger Zone</h2><p class="card-sub">Irreversible account actions</p></div></div>
      <div class="danger-actions"><button class="btn-danger">Reset Password</button><button class="btn-danger">Delete Account</button></div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────
// RENDER / WIRE-UP
// ─────────────────────────────────────────────────────────────

function renderSidebarNav() {
  const nav = document.getElementById("sidebarNav");
  nav.innerHTML = navItems.map(item => `
    <button class="nav-item ${activeNav === item.id ? "nav-active" : ""}" data-nav="${item.id}">
      <span class="nav-icon">${item.icon}</span><span>${item.label}</span>
      ${item.id === "approvals" ? `<span class="nav-badge">${adminStats.pendingApprovals}</span>` : ""}
    </button>`).join("");

  nav.querySelectorAll("[data-nav]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      activeNav = btn.getAttribute("data-nav");
      sidebarOpen = false;
      renderAll();
      const main = document.getElementById("mainContent");
      if (main) main.scrollTop = 0;
      window.scrollTo({ top: 0, left: 0, behavior: "instant" });
    });
  });
}

function renderTopbar() {
  const page = pageMap[activeNav];
  document.getElementById("pageTitle").textContent = page.title;
  document.getElementById("pageSub").textContent = page.sub;
}

function renderContent() {
  const page = pageMap[activeNav];
  const area = document.getElementById("contentArea");
  area.innerHTML = page.render();
  wirePageControls();
  animateFills();
}

function renderSidebarState() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  sidebar.classList.toggle("sidebar-open", sidebarOpen);
  overlay.style.display = sidebarOpen ? "block" : "none";
}

function wirePageControls() {
  const area = document.getElementById("contentArea");
  if (area) {
    area.querySelectorAll("button, .stat-card, .alert-item, .region-item, .legend-item, .approval-item, .approval-card, .team-filter-btn, .role-filter-btn, .btn-outline, .btn-primary, .btn-icon, .btn-approve, .btn-reject, .btn-danger, .toggle, .language-select, .nav-item, .close-btn, .hamburger, .logout-full-btn").forEach(el => {
      if (el.closest("#sidebarNav") || el.closest("#sidebar")) return;
      if (el.classList.contains("toggle") || el.tagName === "SELECT") return;
      if (el.closest(".toggle") || el.closest(".language-select")) return;
      if (el.id === "settingsLogoutBtn") return;
      if (el.classList.contains("stat-card")) { el.addEventListener("click", go404); return; }
      if (el.classList.contains("alert-item")) { el.addEventListener("click", go404); return; }
      if (el.classList.contains("region-item")) { el.addEventListener("click", go404); return; }
      if (el.classList.contains("legend-item")) { el.addEventListener("click", go404); return; }
      if (el.classList.contains("approval-item")) { el.addEventListener("click", go404); return; }
      if (el.classList.contains("approval-card")) { el.addEventListener("click", go404); return; }
      if (el.tagName === "BUTTON") {
        if (el.classList.contains("team-filter-btn") || el.classList.contains("role-filter-btn")) return;
        if (el.closest(".filter-row")) return;
        el.addEventListener("click", go404);
      }
    });
  }

  const settingsLogoutBtn = document.getElementById("settingsLogoutBtn");
  if (settingsLogoutBtn) settingsLogoutBtn.addEventListener("click", logoutUser);

  const distSearch = document.getElementById("distributorSearchInput");
  if (distSearch) {
    distSearch.addEventListener("input", (e) => {
      distributorSearch = e.target.value;
      renderContent();
      const el = document.getElementById("distributorSearchInput");
      if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
    });
  }

  document.querySelectorAll(".role-filter-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      distributorRoleFilter = btn.getAttribute("data-role");
      renderContent();
    });
  });

  document.querySelectorAll(".team-filter-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      teamFilter = btn.getAttribute("data-status");
      renderContent();
    });
  });

  const prodSearch = document.getElementById("productSearchInput");
  if (prodSearch) {
    prodSearch.addEventListener("input", (e) => {
      productSearch = e.target.value;
      renderContent();
      const el = document.getElementById("productSearchInput");
      if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
    });
  }

  document.querySelectorAll("[data-toggle]").forEach(t => {
    t.addEventListener("click", (e) => {
      e.stopPropagation();
      const key = t.getAttribute("data-toggle");
      settingsState[key] = !settingsState[key];
      renderContent();
    });
  });
  const langSelect = document.getElementById("languageSelect");
  if (langSelect) {
    langSelect.addEventListener("change", (e) => {
      e.stopPropagation();
      settingsState.language = e.target.value;
    });
  }
}

function renderAll() {
  renderSidebarNav();
  renderTopbar();
  renderContent();
  renderSidebarState();
}

document.getElementById("hamburgerBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  sidebarOpen = true;
  renderSidebarState();
});
document.getElementById("closeSidebarBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  sidebarOpen = false;
  renderSidebarState();
});
document.getElementById("sidebarOverlay").addEventListener("click", () => {
  sidebarOpen = false;
  renderSidebarState();
});

document.getElementById("sidebarLogoutBtn").addEventListener("click", logoutUser);
document.getElementById("topbarLogoutBtn").addEventListener("click", logoutUser);

document.getElementById("topbarUserBtn").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("topbarUser").classList.toggle("open");
});
document.addEventListener("click", () => {
  document.getElementById("topbarUser").classList.remove("open");
});
document.querySelectorAll(".topbar-user-menu [data-nav]").forEach(btn => {
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    activeNav = btn.getAttribute("data-nav");
    renderAll();
  });
});

document.querySelector(".topbar .search-box")?.addEventListener("click", go404);
document.querySelector(".topbar .search-box input")?.addEventListener("focus", go404);
document.querySelector(".topbar .icon-btn")?.addEventListener("click", go404);

paintUserChrome();
renderAll();
</script>
</body>
</html>
